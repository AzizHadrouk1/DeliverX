spring.application.name=ASSIGNMENT-SERVICE
spring.config.import=optional:configserver:http://localhost:8888
spring.datasource.url=jdbc:h2:mem:assignmentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=ayoub
spring.datasource.password=ayoub

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
server.port=8081
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# RabbitMQ (overridden by SPRING_RABBITMQ_HOST in Docker)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
