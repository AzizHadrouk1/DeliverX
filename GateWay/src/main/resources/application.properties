spring.application.name=Gateway
spring.config.import=optional:configserver:http://localhost:8888
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
server.port=8090

# OAuth2 Resource Server (Keycloak) - centralized authentication check for all proxied routes
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/deliverx
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/deliverx/protocol/openid-connect/certs

# Prevent duplicate CORS headers when gateway and downstream services both emit them
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

logging.level.org.springframework.cloud.gateway=DEBUG 
logging.level.reactor.netty.http.client=DEBUG