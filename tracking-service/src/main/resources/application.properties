spring.application.name=TRACKING-SERVICE
spring.config.import=optional:configserver:http://localhost:8888
server.port=8099
# MongoDB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=tracking_db
spring.data.mongodb.username=tracking_user
spring.data.mongodb.password=tracking_pass
spring.data.mongodb.authentication-database=admin

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.esprit.microservice.tracking=INFO
