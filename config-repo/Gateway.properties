server.port=8090
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty.http.client=INFO

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].name=assignment-service
springdoc.swagger-ui.urls[0].url=/aggregated-docs/assignment
springdoc.swagger-ui.urls[1].name=driver-client-service
springdoc.swagger-ui.urls[1].url=/aggregated-docs/driver-client
springdoc.swagger-ui.urls[2].name=vehicle-service
springdoc.swagger-ui.urls[2].url=/aggregated-docs/vehicle
springdoc.swagger-ui.urls[3].name=delivery-service
springdoc.swagger-ui.urls[3].url=/aggregated-docs/delivery
springdoc.swagger-ui.urls[4].name=package-service
springdoc.swagger-ui.urls[4].url=/aggregated-docs/package
springdoc.swagger-ui.urls[5].name=tracking-service
springdoc.swagger-ui.urls[5].url=/aggregated-docs/tracking
springdoc.swagger-ui.urls-primary-name=delivery-service
