<section class="form-page">
  <a routerLink="/packages">← Back to packages</a>
  <h1>{{ isEdit ? 'Edit package' : 'Add package' }}</h1>

  <form (ngSubmit)="submit()">
    <div class="grid">
      <label>
        Weight (kg)
        <input type="number" step="0.01" [(ngModel)]="pkg.weight" name="weight" required min="0.01" />
      </label>
      <label>
        Width
        <input type="number" step="0.01" [(ngModel)]="pkg.width" name="width" min="0.01" />
      </label>
      <label>
        Height
        <input type="number" step="0.01" [(ngModel)]="pkg.height" name="height" min="0.01" />
      </label>
      <label>
        Depth
        <input type="number" step="0.01" [(ngModel)]="pkg.depth" name="depth" min="0.01" />
      </label>
      <label>
        Client ID
        <input type="number" [(ngModel)]="pkg.clientId" name="clientId" required min="1" />
      </label>
      <label class="full">
        Description
        <textarea [(ngModel)]="pkg.description" name="description" rows="3"></textarea>
      </label>
    </div>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" class="btn" [disabled]="saving()">
      {{ saving() ? 'Saving...' : 'Save package' }}
    </button>
  </form>
</section>
