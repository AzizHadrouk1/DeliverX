<section class="login">
  <div class="panel">
    <h1>Admin sign in</h1>
    <p>Access fleet, package, and delivery operations.</p>

    <form (ngSubmit)="submit()">
      <label>
        Username
        <input type="text" [(ngModel)]="username" name="username" required />
      </label>
      <label>
        Password
        <input type="password" [(ngModel)]="password" name="password" required />
      </label>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <button type="submit" class="btn" [disabled]="loading()">
        {{ loading() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="hint">Demo: <code>admin1</code> / <code>admin123</code> (authenticated via Keycloak)</p>
  </div>
</section>
