<section class="login">
  <div class="panel">
    <h1>Admin sign in</h1>
    <p>Access fleet, package, and delivery operations.</p>

    <form (ngSubmit)="submit()">
      <label>
        Email
        <input type="email" [(ngModel)]="email" name="email" required />
      </label>
      <label>
        Password
        <input type="password" [(ngModel)]="password" name="password" required />
      </label>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <button type="submit" class="btn">Sign in</button>
    </form>

    <p class="hint">Demo: admin&#64;deliverx.com / password <code>admin</code></p>
  </div>
</section>
