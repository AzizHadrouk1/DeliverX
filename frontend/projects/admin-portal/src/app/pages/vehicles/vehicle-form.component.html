<section class="form-page">
  <a routerLink="/vehicles">← Back to fleet</a>
  <h1>{{ isEdit ? 'Edit vehicle' : 'Add vehicle' }}</h1>

  <form (ngSubmit)="submit()">
    <div class="grid">
      <label>
        License plate
        <input [(ngModel)]="vehicle.licensePlate" name="licensePlate" required />
      </label>
      <label>
        Brand
        <input [(ngModel)]="vehicle.brand" name="brand" required />
      </label>
      <label>
        Model
        <input [(ngModel)]="vehicle.model" name="model" required />
      </label>
      <label>
        Type
        <select [(ngModel)]="vehicle.type" name="type" required>
          @for (type of types; track type) {
            <option [value]="type">{{ type }}</option>
          }
        </select>
      </label>
      <label>
        Status
        <select [(ngModel)]="vehicle.status" name="status" required>
          @for (status of statuses; track status) {
            <option [value]="status">{{ status }}</option>
          }
        </select>
      </label>
      <label>
        Manufacturing year
        <input type="number" [(ngModel)]="vehicle.manufacturingYear" name="year" required />
      </label>
      <label>
        Max weight (kg)
        <input type="number" [(ngModel)]="vehicle.maxWeightCapacity" name="weight" required />
      </label>
      <label>
        Max volume (m³)
        <input type="number" step="0.01" [(ngModel)]="vehicle.maxVolumeCapacity" name="volume" required />
      </label>
    </div>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" class="btn" [disabled]="saving()">
      {{ saving() ? 'Saving...' : 'Save vehicle' }}
    </button>
  </form>
</section>
