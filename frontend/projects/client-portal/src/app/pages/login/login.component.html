<section class="login">
  <h1>Client login</h1>
  <p>Sign in to access your shipment history and saved tracking links.</p>

  <form (ngSubmit)="submit()">
    <label>
      Email
      <input type="email" [(ngModel)]="email" name="email" required />
    </label>
    <label>
      Password
      <input type="password" [(ngModel)]="password" name="password" required />
    </label>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" class="btn">Sign in</button>
  </form>

  <p class="hint">Demo: any email + password <code>client</code></p>
</section>
