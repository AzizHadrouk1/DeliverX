<section class="login">
  <h1>Client login</h1>
  <p>Sign in to access your shipment history and saved tracking links.</p>

  <form (ngSubmit)="submit()">
    <label>
      Username
      <input type="text" [(ngModel)]="username" name="username" required />
    </label>
    <label>
      Password
      <input type="password" [(ngModel)]="password" name="password" required />
    </label>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" class="btn" [disabled]="loading()">
      {{ loading() ? 'Signing in...' : 'Sign in' }}
    </button>
  </form>

  <p class="hint">Demo: <code>client1</code> / <code>client123</code> (authenticated via Keycloak)</p>
</section>
